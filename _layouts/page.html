<article class="post{% if page.url == '/portfolio/' %} portfolio-page{% endif %}{% if page.url == '/privacy-policy/' %} privacy-policy-page{% endif %}">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
